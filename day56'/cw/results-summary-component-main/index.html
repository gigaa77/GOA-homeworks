<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!--Continue -->
   <div class="parent">
    <div class="parent1">
      <p class="p1">Your Result</p>
      <div class="circle">
        <h1 class="firsth">76</h1>
        <p class="p2">of 100</p>
      </div>
      <h1 class="secondh">Great</h1>
      <p class="p3">You scored higher than 65% of the people who have taken these tests.</p>
    </div>
    <div class="parent2">
      <h1 class="thirdh">Summary</h1>
      <div class="longdivs reddiv">
        <img src="./assets/images/icon-reaction.svg" alt="" class="fourimg">
        <p class="fourp red">Reaction</p>
        <p>
          <span class="main">80</span>
          <span class="total">/ 100</span>
        </p>
      </div>
      <div class="longdivs yellowdiv">
        <img src="./assets/images/icon-memory.svg" alt="" class="fourimg">
        <p class="fourp yellow">Memory</p>
        <p>
          <span class="main">92</span>
          <span class="total">/ 100</span>
        </p>
      </div>
      <div class="longdivs greendiv">
        <img src="./assets/images/icon-verbal.svg" alt="" class="fourimg">
        <p class="fourp green">Verbal</p>
        <p>
          <span class="main">61</span>
          <span class="total">/ 100</span>
        </p>
      </div>
      <div class="longdivs bluediv">
        <img src="./assets/images/icon-visual.svg" alt="" class="fourimg">
        <p class="fourp blue">Visual</p>
        <p>
          <span class="main">72</span>
          <span class="total">/ 100</span>
        </p>
      </div>
      <button>Continue</button>
    </div>
   </div>
  
</body>
</html>
